---
# Généré automatiquement par l'orchestrateur

- name: Provisionnement commun
  hosts: all
  become: true
  gather_facts: no
  tasks:
    - name: Desactivation reverse DNS SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?UseDNS'
        line: 'UseDNS no'
      register: sshd_dns
    - name: Redemarrage sshd si modifie
      service:
        name: ssh
        state: restarted
      when: sshd_dns.changed
    - name: Attente fin cloud-init
      command: cloud-init status --wait
      changed_when: false
      failed_when: false
    - name: Attente liberation verrou apt
      shell: while fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do sleep 2; done
      changed_when: false
    - name: Mise a jour du cache apt
      apt:
        update_cache: yes
        cache_valid_time: 3600
        lock_timeout: 300
    - name: Installation des paquets communs
      apt:
        name:
          - curl
          - rsync
          - ca-certificates
        state: present
        lock_timeout: 300

- name: Provisionnement apache
  hosts: apache
  become: true
  gather_facts: no
  tasks:
    - name: Attente liberation verrou apt
      shell: while fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do sleep 2; done
      changed_when: false
    - name: Installation paquets apache
      apt:
        name:
          - apache2
          - php
          - libapache2-mod-php
          - php-mysql
          - php-curl
          - nfs-common
        state: present
        lock_timeout: 300
    - name: Demarrage apache2
      service:
        name: apache2
        state: started
        enabled: true

