# ─── Authentification OpenStack ───────────────────────────────────────────────
openstack:
  auth_url:        "http://10.0.0.10:5000/v3"
  region:          "RegionOne"
  default_user:    "migration-user"
  default_project: "migration"

# ─── Réseau ───────────────────────────────────────────────────────────────────
network:
  provider:          "provider"
  internal_cidr:     "10.10.10.0/24"
  internal_gateway:  "10.10.10.1"
  api_ip:            "10.0.0.10"

# ─── Image de base ────────────────────────────────────────────────────────────
image:
  name: "ubuntu-22.04"

# ─── SSH ──────────────────────────────────────────────────────────────────────
ssh:
  key_path: "~/.ssh/migration_key"
  user:     "ubuntu"

# ─── Répertoire de staging sur les instances distantes ────────────────────────
staging_dir: "/tmp/migration"

# ─── Flavors OpenStack par nom de container (fallback: default) ───────────────
# Ajouter un nouveau container dans LXC suffit — le script le détecte
# automatiquement et lui attribue le flavor correspondant (ou "default").
flavors:
  default: "m1.small"
  mariadb: "m1.mariadb"
  apache:  "m1.apache"
  backup:  "m1.backup"
  ftp:     "m1.ftp"
  nfs:     "m1.nfs"

# ─── Pool d'IPs internes ──────────────────────────────────────────────────────
# Première IP du pool. Chaque container reçoit +10 sur le dernier octet.
internal_ip_pool: "10.10.10.10"
